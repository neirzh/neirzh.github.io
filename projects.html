<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Neirzhei Notes - Projects</title>
</head>
<body>
    <header>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav id="nav-menu" class="nav-menu">
            <ul>
                <li><a href="index.html">Thoughts</a></li>
                <li><a href="interests.html">Interests</a></li>
                <li><a href="projects.html" class="active">Projects</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="middle">
            <h1>Projects</h1>
            <!-- Add project posts here with same structure as Thoughts -->
            <div class="post" onclick="togglePost(this)">
                <h2>Sample Project</h2>
                <div class="post-content">
                    <p>This is a placeholder for your projects. Add your content here.</p>
                    <p>_______<br>October 2024</p>
                    <span class="collapse-arrow" onclick="collapsePost(this)">↑</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function togglePost(element) {
            const content = element.querySelector('.post-content');
            if (!content.style.display || content.style.display === 'none') {
                content.style.display = 'block';
                element.classList.add('expanded');
            } else {
                content.style.display = 'none';
                element.classList.remove('expanded');
            }
        }

        function collapsePost(arrow) {
            const post = arrow.closest('.post');
            const content = post.querySelector('.post-content');
            content.style.display = 'none';
            post.classList.remove('expanded');
            event.stopPropagation();
        }

        document.getElementById('hamburger').addEventListener('click', () => {
            const nav = document.getElementById('nav-menu');
            const hamburger = document.getElementById('hamburger');
            nav.classList.toggle('open');
            hamburger.classList.toggle('open');
        });
    </script>
</body>
</html>
